<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>听澜书阁 - 专业有声书平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="effects.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#f97316',
                        dark: '#1f2937',
                        light: '#f3f4f6'
                    },
                    fontFamily: {
                        heading: ['Montserrat', 'sans-serif'],
                        body: ['Open Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Montserrat', sans-serif;
        }
        .carousel-item {
            transition: transform 0.5s ease-in-out;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .book-card {
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            color: #f97316;
        }
        .btn-primary {
            background-color: #1e3a8a;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #1e40af;
        }
        .btn-secondary {
            background-color: #f97316;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background-color: #ea580c;
        }
        .dark .bg-white {
            background-color: #1f2937;
        }
        .dark .text-gray-800 {
            color: #f3f4f6;
        }
        .dark .text-gray-600 {
            color: #d1d5db;
        }
        .dark .text-gray-700 {
            color: #e5e7eb;
        }
        .dark .bg-gray-50 {
            background-color: #374151;
        }
        .dark .bg-gray-100 {
            background-color: #4b5563;
        }
        .dark .border-gray-200 {
            border-color: #4b5563;
        }
        .dark .shadow-md {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
        }
        .progress-bar {
            height: 4px;
            background: #e5e7eb;
            cursor: pointer;
        }
        .progress-bar:hover {
            height: 6px;
        }
        .progress-fill {
            height: 100%;
            background: #1e3a8a;
            transition: width 0.1s linear;
        }
        .dark .progress-bar {
            background: #4b5563;
        }
        .dark .progress-fill {
            background: #f97316;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    <nav class="bg-white dark:bg-gray-800 shadow-md fixed w-full top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center space-x-2">
                        <i class="fas fa-headphones text-2xl text-primary"></i>
                        <span class="text-xl font-bold text-gray-800 dark:text-white font-heading">听澜书阁</span>
                    </a>
                </div>
                
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="nav-link text-gray-700 dark:text-gray-300 font-medium">首页</a>
                    <a href="category.html" class="nav-link text-gray-700 dark:text-gray-300 font-medium">分类</a>
                    <a href="search.html" class="nav-link text-gray-700 dark:text-gray-300 font-medium">搜索</a>
                    <a href="profile.html" class="nav-link text-gray-700 dark:text-gray-300 font-medium">个人中心</a>
                </div>
                
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <input type="text" placeholder="搜索书籍..." class="w-48 md:w-64 px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary">
                        <button class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-primary">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    
                    <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-gray-600">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:inline"></i>
                    </button>
                    
                    <a href="login.html" class="btn-primary text-white px-4 py-2 rounded-lg font-medium">
                        登录
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-16 pb-24">
        <section class="relative min-h-screen flex items-center justify-center">
            <div class="absolute inset-0 z-0">
                <video autoplay muted loop class="w-full h-full object-cover">
                    <source src="vid/vid1.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="absolute inset-0 bg-gradient-to-r from-primary/80 to-blue-600/80"></div>
            </div>
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 py-20">
                <div class="text-center text-white">
                    <h1 class="text-5xl md:text-6xl lg:text-7xl font-bold mb-6 font-heading text-secondary">发现优质有声书</h1>
                    <p class="text-2xl md:text-3xl mb-8 opacity-90 max-w-3xl mx-auto">随时随地，享受阅读的乐趣</p>
                    <div class="flex flex-col sm:flex-row justify-center space-y-4 sm:space-y-0 sm:space-x-6 mt-10">
                        <a href="category.html" class="btn-secondary text-white px-10 py-4 rounded-lg font-medium text-xl w-full sm:w-auto">
                            开始探索
                        </a>
                        <a href="login.html" class="bg-white text-primary px-10 py-4 rounded-lg font-medium text-xl hover:bg-gray-100 transition w-full sm:w-auto">
                            立即注册
                        </a>
                    </div>
                    <div class="mt-16 animate-bounce">
                        <a href="#categories" class="text-white opacity-80 hover:opacity-100">
                            <i class="fas fa-chevron-down text-2xl"></i>
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <section id="categories" class="py-12 bg-white dark:bg-gray-800 fade-in">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-8 font-heading">热门分类</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                    <a href="category.html?type=novel" class="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-6 rounded-xl text-center hover:shadow-lg transition icon-hover">
                        <i class="fas fa-book text-3xl mb-3"></i>
                        <p class="font-medium">小说</p>
                    </a>
                    <a href="category.html?type=history" class="bg-gradient-to-br from-green-500 to-green-600 text-white p-6 rounded-xl text-center hover:shadow-lg transition icon-hover">
                        <i class="fas fa-landmark text-3xl mb-3"></i>
                        <p class="font-medium">历史</p>
                    </a>
                    <a href="category.html?type=science" class="bg-gradient-to-br from-purple-500 to-purple-600 text-white p-6 rounded-xl text-center hover:shadow-lg transition icon-hover">
                        <i class="fas fa-flask text-3xl mb-3"></i>
                        <p class="font-medium">科学</p>
                    </a>
                    <a href="category.html?type=business" class="bg-gradient-to-br from-orange-500 to-orange-600 text-white p-6 rounded-xl text-center hover:shadow-lg transition icon-hover">
                        <i class="fas fa-briefcase text-3xl mb-3"></i>
                        <p class="font-medium">商业</p>
                    </a>
                    <a href="category.html?type=education" class="bg-gradient-to-br from-pink-500 to-pink-600 text-white p-6 rounded-xl text-center hover:shadow-lg transition icon-hover">
                        <i class="fas fa-graduation-cap text-3xl mb-3"></i>
                        <p class="font-medium">教育</p>
                    </a>
                    <a href="category.html?type=art" class="bg-gradient-to-br from-red-500 to-red-600 text-white p-6 rounded-xl text-center hover:shadow-lg transition icon-hover">
                        <i class="fas fa-palette text-3xl mb-3"></i>
                        <p class="font-medium">艺术</p>
                    </a>
                </div>
            </div>
        </section>

        <section class="py-12 bg-gray-50 dark:bg-gray-900 fade-in-up">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-white font-heading">热门推荐</h2>
                    <a href="category.html?sort=hot" class="text-primary hover:text-blue-700 font-medium link-underline">查看更多 <i class="fas fa-arrow-right ml-1"></i></a>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="hotBooks">
                </div>
            </div>
        </section>

        <section class="py-12 bg-white dark:bg-gray-800 fade-in-up">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-white font-heading">新书上架</h2>
                    <a href="category.html?sort=new" class="text-primary hover:text-blue-700 font-medium link-underline">查看更多 <i class="fas fa-arrow-right ml-1"></i></a>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="newBooks">
                </div>
            </div>
        </section>

        <section class="py-12 bg-gray-50 dark:bg-gray-900 fade-in-up">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white font-heading">个性化推荐</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="recommendBooks">
                </div>
            </div>
        </section>
    </main>

    <div class="player-bar bg-white dark:bg-gray-800 shadow-lg border-t border-gray-200 dark:border-gray-700" id="playerBar">
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4 flex-1">
                    <img src="img/book.jpg" alt="书籍封面" class="w-12 h-16 object-cover rounded" id="playerCover">
                    <div>
                        <h4 class="font-medium text-gray-800 dark:text-white text-sm" id="playerTitle">未播放</h4>
                        <p class="text-gray-500 dark:text-gray-400 text-xs" id="playerAuthor">选择书籍开始播放</p>
                    </div>
                </div>
                
                <div class="flex items-center space-x-6">
                    <button class="text-gray-600 dark:text-gray-300 hover:text-primary" id="prevBtn">
                        <i class="fas fa-backward-step text-xl"></i>
                    </button>
                    <button class="bg-primary text-white w-12 h-12 rounded-full flex items-center justify-center hover:bg-blue-700 transition" id="playPauseBtn">
                        <i class="fas fa-play text-xl" id="playIcon"></i>
                    </button>
                    <button class="text-gray-600 dark:text-gray-300 hover:text-primary" id="nextBtn">
                        <i class="fas fa-forward-step text-xl"></i>
                    </button>
                </div>
                
                <div class="flex items-center space-x-4 flex-1 justify-end">
                    <div class="flex items-center space-x-2">
                        <span class="text-gray-500 dark:text-gray-400 text-xs" id="currentTime">0:00</span>
                        <span class="text-gray-400 text-xs">/</span>
                        <span class="text-gray-500 dark:text-gray-400 text-xs" id="totalTime">0:00</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button class="text-gray-600 dark:text-gray-300 hover:text-primary" id="volumeBtn">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <input type="range" min="0" max="100" value="80" class="w-20 h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer" id="volumeSlider">
                    </div>
                    <button class="text-gray-600 dark:text-gray-300 hover:text-primary" id="speedBtn">
                        <span class="text-xs font-medium">1.0x</span>
                    </button>
                    <button class="text-gray-600 dark:text-gray-300 hover:text-primary" id="timerBtn">
                        <i class="fas fa-clock"></i>
                    </button>
                    <a href="player.html" class="text-gray-600 dark:text-gray-300 hover:text-primary">
                        <i class="fas fa-expand"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-gray-800 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                <div>
                    <div class="flex items-center space-x-2 mb-4">
                        <i class="fas fa-headphones text-2xl text-secondary"></i>
                        <span class="text-xl font-bold font-heading">听澜书阁</span>
                    </div>
                    <p class="text-gray-400 text-sm">专业的有声书阅读平台，为您提供优质的听书体验。</p>
                </div>
                <div>
                    <h4 class="font-bold mb-4">快速链接</h4>
                    <ul class="space-y-2 text-gray-400 text-sm">
                        <li><a href="index.html" class="hover:text-white transition">首页</a></li>
                        <li><a href="category.html" class="hover:text-white transition">分类</a></li>
                        <li><a href="search.html" class="hover:text-white transition">搜索</a></li>
                        <li><a href="profile.html" class="hover:text-white transition">个人中心</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-bold mb-4">帮助中心</h4>
                    <ul class="space-y-2 text-gray-400 text-sm">
                        <li><a href="#" class="hover:text-white transition">常见问题</a></li>
                        <li><a href="#" class="hover:text-white transition">使用指南</a></li>
                        <li><a href="#" class="hover:text-white transition">联系客服</a></li>
                        <li><a href="#" class="hover:text-white transition">意见反馈</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-bold mb-4">关注我们</h4>
                    <div class="flex space-x-4">
                        <a href="#" class="text-gray-400 hover:text-white transition text-xl"><i class="fab fa-weixin"></i></a>
                        <a href="#" class="text-gray-400 hover:text-white transition text-xl"><i class="fab fa-weibo"></i></a>
                        <a href="#" class="text-gray-400 hover:text-white transition text-xl"><i class="fab fa-qq"></i></a>
                        <a href="#" class="text-gray-400 hover:text-white transition text-xl"><i class="fab fa-tiktok"></i></a>
                    </div>
                </div>
            </div>
            <div class="border-t border-gray-700 mt-8 pt-8 text-center text-gray-400 text-sm">
                <p>&copy; 2024 听澜书阁. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="effects.js"></script>
    <script src="main.js"></script>
</body>
</html>
