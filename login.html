<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - 听澜书阁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="effects.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#f97316',
                        dark: '#1f2937',
                        light: '#f3f4f6'
                    },
                    fontFamily: {
                        heading: ['Montserrat', 'sans-serif'],
                        body: ['Open Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Montserrat', sans-serif;
        }
        .btn-primary {
            background-color: #1e3a8a;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #1e40af;
        }
        .btn-secondary {
            background-color: #f97316;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background-color: #ea580c;
        }
        .dark .bg-white {
            background-color: #1f2937;
        }
        .dark .text-gray-800 {
            color: #f3f4f6;
        }
        .dark .text-gray-600 {
            color: #d1d5db;
        }
        .dark .text-gray-700 {
            color: #e5e7eb;
        }
        .dark .bg-gray-50 {
            background-color: #374151;
        }
        .dark .bg-gray-100 {
            background-color: #4b5563;
        }
        .dark .border-gray-200 {
            border-color: #4b5563;
        }
        .dark .shadow-md {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .auth-tab {
            transition: all 0.3s ease;
        }
        .auth-tab.active {
            border-bottom: 3px solid #1e3a8a;
            color: #1e3a8a;
        }
        .dark .auth-tab.active {
            border-bottom: 3px solid #f97316;
            color: #f97316;
        }
        .social-btn {
            transition: all 0.3s ease;
        }
        .social-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    <nav class="bg-white dark:bg-gray-800 shadow-md fixed w-full top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center space-x-2">
                        <i class="fas fa-headphones text-2xl text-primary"></i>
                        <span class="text-xl font-bold text-gray-800 dark:text-white font-heading">听澜书阁</span>
                    </a>
                </div>
                
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="nav-link text-gray-700 dark:text-gray-300 font-medium">首页</a>
                    <a href="category.html" class="nav-link text-gray-700 dark:text-gray-300 font-medium">分类</a>
                    <a href="search.html" class="nav-link text-gray-700 dark:text-gray-300 font-medium">搜索</a>
                    <a href="profile.html" class="nav-link text-gray-700 dark:text-gray-300 font-medium">个人中心</a>
                </div>
                
                <div class="flex items-center space-x-4">
                    <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-gray-600">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:inline"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-16 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <div class="text-center">
                <div class="flex justify-center mb-4">
                    <i class="fas fa-headphones text-6xl text-primary"></i>
                </div>
                <h2 class="text-3xl font-bold text-gray-900 dark:text-white font-heading">欢迎回来</h2>
                <p class="mt-2 text-gray-600 dark:text-gray-400">登录您的账户，开始听书之旅</p>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="flex space-x-8 mb-8 border-b border-gray-200 dark:border-gray-700">
                    <button class="auth-tab active flex-1 pb-4 text-center font-medium text-gray-700 dark:text-gray-300" data-tab="login">
                        登录
                    </button>
                    <button class="auth-tab flex-1 pb-4 text-center font-medium text-gray-700 dark:text-gray-300" data-tab="register">
                        注册
                    </button>
                </div>

                <div id="loginForm">
                    <form class="space-y-6">
                        <div>
                            <label for="loginEmail" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">邮箱地址</label>
                            <div class="relative">
                                <input type="email" id="loginEmail" class="w-full px-4 py-3 pl-12 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请输入邮箱">
                                <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            </div>
                        </div>

                        <div>
                            <label for="loginPassword" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">密码</label>
                            <div class="relative">
                                <input type="password" id="loginPassword" class="w-full px-4 py-3 pl-12 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请输入密码">
                                <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                <button type="button" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-primary">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <input type="checkbox" id="remember" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
                                <label for="remember" class="ml-2 text-sm text-gray-600 dark:text-gray-400">记住我</label>
                            </div>
                            <a href="#" class="text-sm text-primary hover:text-blue-700">忘记密码？</a>
                        </div>

                        <button type="submit" class="w-full btn-primary text-white py-3 rounded-lg font-medium text-lg">
                            登录
                        </button>
                    </form>

                    <div class="mt-6">
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-white dark:bg-gray-800 text-gray-500">或使用以下方式登录</span>
                            </div>
                        </div>

                        <div class="mt-6 grid grid-cols-3 gap-3">
                            <button class="social-btn flex items-center justify-center px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                <i class="fab fa-weixin text-2xl text-green-500"></i>
                            </button>
                            <button class="social-btn flex items-center justify-center px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                <i class="fab fa-qq text-2xl text-blue-500"></i>
                            </button>
                            <button class="social-btn flex items-center justify-center px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                <i class="fab fa-weibo text-2xl text-red-500"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="registerForm" class="hidden">
                    <form class="space-y-6">
                        <div>
                            <label for="registerName" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">用户名</label>
                            <div class="relative">
                                <input type="text" id="registerName" class="w-full px-4 py-3 pl-12 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请输入用户名">
                                <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            </div>
                        </div>

                        <div>
                            <label for="registerEmail" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">邮箱地址</label>
                            <div class="relative">
                                <input type="email" id="registerEmail" class="w-full px-4 py-3 pl-12 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请输入邮箱">
                                <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            </div>
                        </div>

                        <div>
                            <label for="registerPassword" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">密码</label>
                            <div class="relative">
                                <input type="password" id="registerPassword" class="w-full px-4 py-3 pl-12 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请输入密码">
                                <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                <button type="button" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-primary">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">确认密码</label>
                            <div class="relative">
                                <input type="password" id="confirmPassword" class="w-full px-4 py-3 pl-12 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请再次输入密码">
                                <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            </div>
                        </div>

                        <div class="flex items-start">
                            <input type="checkbox" id="agree" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary mt-1">
                            <label for="agree" class="ml-2 text-sm text-gray-600 dark:text-gray-400">
                                我已阅读并同意 <a href="#" class="text-primary hover:text-blue-700">用户协议</a> 和 <a href="#" class="text-primary hover:text-blue-700">隐私政策</a>
                            </label>
                        </div>

                        <button type="submit" class="w-full btn-secondary text-white py-3 rounded-lg font-medium text-lg">
                            注册
                        </button>
                    </form>

                    <div class="mt-6">
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-white dark:bg-gray-800 text-gray-500">或使用以下方式注册</span>
                            </div>
                        </div>

                        <div class="mt-6 grid grid-cols-3 gap-3">
                            <button class="social-btn flex items-center justify-center px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                <i class="fab fa-weixin text-2xl text-green-500"></i>
                            </button>
                            <button class="social-btn flex items-center justify-center px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                <i class="fab fa-qq text-2xl text-blue-500"></i>
                            </button>
                            <button class="social-btn flex items-center justify-center px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                <i class="fab fa-weibo text-2xl text-red-500"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <p class="text-center text-gray-600 dark:text-gray-400 text-sm">
                遇到问题？<a href="#" class="text-primary hover:text-blue-700">联系客服</a>
            </p>
        </div>
    </main>

    <script src="effects.js"></script>
    <script src="main.js"></script>
</body>
</html>
